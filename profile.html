<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PACIFIC | User Information &amp; OCEAN Assessment</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    document.getElementById('submitBtn').addEventListener('click', function() {
        const form = document.getElementById('profileForm');
        const requiredInputs = form.querySelectorAll('[required]');
        const errorMessage = document.getElementById('errorMessage');
        let isValid = true;

        requiredInputs.forEach(input => {
            if (!input.value.trim()) {
                isValid = false;
                input.classList.add('ring-2', 'ring-error');
            } else {
                input.classList.remove('ring-2', 'ring-error');
            }
        });

        if (!isValid) {
            errorMessage.classList.remove('hidden');
            window.scrollTo({ top: errorMessage.offsetTop - 200, behavior: 'smooth' });
            return;
        }

        errorMessage.classList.add('hidden');

        // Logic to classify scores
        const getClassification = (score) => (parseInt(score) < 50 ? 'Low' : 'High');

        const oceanScores = {
            O: { value: document.getElementById('scoreO').value, level: getClassification(document.getElementById('scoreO').value) },
            C: { value: document.getElementById('scoreC').value, level: getClassification(document.getElementById('scoreC').value) },
            E: { value: document.getElementById('scoreE').value, level: getClassification(document.getElementById('scoreE').value) },
            A: { value: document.getElementById('scoreA').value, level: getClassification(document.getElementById('scoreA').value) },
            N: { value: document.getElementById('scoreN').value, level: getClassification(document.getElementById('scoreN').value) }
        };

        const userProfile = {
            fullName: document.getElementById('fullName').value,
            age: document.getElementById('age').value || null,
            gender: document.getElementById('gender').value || 'Not Specified',
            groupNumber: document.getElementById('groupNumber').value,
            ocean: oceanScores,
            // Additional field to support Screen 2's specific requirement for a 'trait' and 'level' key
            // We'll pick the first trait as primary for the survey logic, or just store the full object
            primaryTrait: { trait: 'Extraversion', level: oceanScores.E.level } 
        };

        localStorage.setItem('userProfile', JSON.stringify(userProfile));
        // Compatibility with Screen 2's expected key
        localStorage.setItem('user_ocean_profile', JSON.stringify({ trait: 'Extraversion', level: oceanScores.E.level }));

        window.location.href = 'survey.html';
    });
</script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f7fafc;
        color: #2b3438;
      }
      .font-manrope { font-family: 'Manrope', sans-serif; }
      .ghost-border { outline: 1px solid rgba(170, 179, 184, 0.15); }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-[1024px]" data-mode="connect">
<nav class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-md">
<div class="flex justify-center items-center px-8 py-6 max-w-7xl mx-auto">
<span class="text-2xl font-bold tracking-widest text-cyan-900 dark:text-cyan-100 font-manrope">PACIFIC</span>
</div>
</nav>
<div class="fixed top-0 left-0 w-full h-2 z-[60] bg-surface-variant">
<div class="h-full bg-primary w-1/3"></div>
</div>
<main class="max-w-4xl mx-auto pt-40 pb-24 px-6 lg:px-0">
<header class="mb-20">
<h1 class="text-5xl md:text-6xl font-extrabold font-manrope text-on-surface mb-6 tracking-tight">Profile</h1>
<p class="text-xl text-on-surface-variant max-w-xl font-body leading-relaxed">
                Input basic information</p>
</header>
<form class="space-y-24" id="profileForm">
<section>
<div class="flex flex-col md:flex-row gap-12 items-start">
<div class="md:w-1/3">
<h2 class="text-2xl font-bold font-manrope text-primary mb-2">Core Identity</h2>
<p class="text-sm text-on-surface-variant leading-relaxed">Fundamental Information </p>
</div>
<div class="md:w-2/3 space-y-8 bg-surface-container-low p-8 rounded-xl ghost-border">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold tracking-wide uppercase text-on-surface-variant">Full Name *</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-6 py-5 focus:ring-2 focus:ring-primary text-on-surface placeholder-outline-variant" id="fullName" placeholder="Entry Label" required="" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold tracking-wide uppercase text-on-surface-variant">Age (Optional)</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-6 py-5 focus:ring-2 focus:ring-primary text-on-surface" id="age" placeholder="Years" type="number"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold tracking-wide uppercase text-on-surface-variant">Gender (Optional)</label>
<select class="w-full bg-surface-container-highest border-none rounded-xl px-6 py-5 focus:ring-2 focus:ring-primary text-on-surface appearance-none" id="gender">
<option value="Not Specified">Not Specified</option>
<option value="Non-binary">Non-binary</option>
<option value="Female">Female</option>
<option value="Male">Male</option>
<option value="Fluid">Fluid</option>
</select>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold tracking-wide uppercase text-on-surface-variant">Group Number *</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-6 py-5 focus:ring-2 focus:ring-primary text-on-surface" id="groupNumber" placeholder="Numerical Identifier" required="" type="number"/>
</div>
</div>
</div>
</section>
<section>
<div class="flex flex-col md:flex-row gap-12 items-start">
<div class="md:w-1/3">
<h2 class="text-2xl font-bold font-manrope text-primary mb-2">OCEAN Metrics</h2>
<p class="text-sm text-on-surface-variant leading-relaxed">Record your psychometric scores from 0 to 100.</p>
<div class="mt-8 p-6 bg-primary-container rounded-xl text-on-primary-container text-xs leading-loose">
<span class="font-bold block mb-2 uppercase tracking-widest text-[10px]">Interpretation Key:</span>
<div class="flex justify-between border-b border-primary/20 pb-1 mb-1">
<span>&lt; 50</span>
<span class="font-bold">LOW</span>
</div>
<div class="flex justify-between">
<span>&gt;= 50</span>
<span class="font-bold">HIGH</span>
</div>
</div>
</div>
<div class="md:w-2/3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
<div class="bg-surface-container-lowest p-8 rounded-xl ghost-border flex flex-col gap-4">
<span class="text-3xl font-black text-primary/20 font-manrope">O</span>
<label class="text-sm font-bold text-on-surface">Openness *</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-center text-lg font-bold text-primary ocean-input" data-trait="Openness" id="scoreO" max="100" min="0" required="" type="number"/>
</div>
<div class="bg-surface-container-lowest p-8 rounded-xl ghost-border flex flex-col gap-4">
<span class="text-3xl font-black text-primary/20 font-manrope">C</span>
<label class="text-sm font-bold text-on-surface">Conscientious *</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-center text-lg font-bold text-primary ocean-input" data-trait="Conscientious" id="scoreC" max="100" min="0" required="" type="number"/>
</div>
<div class="bg-surface-container-lowest p-8 rounded-xl ghost-border flex flex-col gap-4">
<span class="text-3xl font-black text-primary/20 font-manrope">E</span>
<label class="text-sm font-bold text-on-surface">Extraversion *</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-center text-lg font-bold text-primary ocean-input" data-trait="Extraversion" id="scoreE" max="100" min="0" required="" type="number"/>
</div>
<div class="bg-surface-container-lowest p-8 rounded-xl ghost-border flex flex-col gap-4">
<span class="text-3xl font-black text-primary/20 font-manrope">A</span>
<label class="text-sm font-bold text-on-surface">Agreeable *</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-center text-lg font-bold text-primary ocean-input" data-trait="Agreeable" id="scoreA" max="100" min="0" required="" type="number"/>
</div>
<div class="bg-surface-container-lowest p-8 rounded-xl ghost-border flex flex-col gap-4">
<span class="text-3xl font-black text-primary/20 font-manrope">N</span>
<label class="text-sm font-bold text-on-surface">Neuroticism *</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-center text-lg font-bold text-primary ocean-input" data-trait="Neuroticism" id="scoreN" max="100" min="0" required="" type="number"/>
</div>
<div class="bg-surface-container-low rounded-xl flex items-center justify-center p-8 opacity-40">
<span class="material-symbols-outlined text-4xl" data-icon="psychology_alt">psychology_alt</span>
</div>
</div>
</div>
</section>
<div class="pt-12 flex flex-col items-end gap-4">
<p class="text-error font-medium text-sm hidden" id="errorMessage">Please fill in all required fields marked with *</p>
<button class="group flex items-center gap-4 bg-primary text-on-primary px-10 py-5 rounded-xl font-bold tracking-widest uppercase text-sm hover:bg-primary-dim transition-all shadow-lg shadow-primary/10" id="submitBtn" type="button">
                    next sequence <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</main>
<footer class="w-full py-12 mt-24 bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800/50">
<div class="flex flex-col md:flex-row justify-between items-center px-12 gap-6 max-w-7xl mx-auto">
<div class="font-manrope font-black text-cyan-900 dark:text-cyan-100 uppercase tracking-tighter">PACIFIC ARCHIVE</div>
</div>
</footer>
<script>
    document.getElementById('submitBtn').addEventListener('click', function() {
        const form = document.getElementById('profileForm');
        const requiredInputs = form.querySelectorAll('[required]');
        const errorMessage = document.getElementById('errorMessage');

            if (!input.value.trim()) {

</script>
</body></html>
