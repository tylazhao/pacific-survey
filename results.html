<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PACIFIC | Survey Complete</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const finishBtn = document.getElementById('finish-btn');
            const indicator = document.getElementById('sync-indicator');
            const textEl = document.getElementById('sync-text');
            const spinner = document.getElementById('sync-spinner');
            
            const setStatus = (state, customMsg) => {
                // Reset classes
                indicator.className = 'flex items-center gap-3 px-6 py-3 rounded-full border text-[12px] font-bold uppercase tracking-widest transition-all duration-500 shadow-sm';
                spinner.className = 'material-symbols-outlined text-lg';
                spinner.textContent = 'sync';
                
                switch(state) {
                    case 'INITIAL':
                        indicator.classList.add('border-slate-200', 'bg-slate-50', 'text-slate-500');
                        textEl.textContent = 'ARCHIVE STATUS: READY TO SYNC';
                        break;
                    case 'SYNCING':
                        indicator.classList.add('border-amber-200', 'bg-amber-50', 'text-amber-700', 'animate-pulse');
                        spinner.classList.add('animate-spin');
                        textEl.textContent = 'ARCHIVE STATUS: SYNCING...';
                        break;
                    case 'SUCCESS':
                        indicator.classList.add('border-green-200', 'bg-green-50', 'text-green-700', 'scale-105');
                        spinner.textContent = 'check_circle';
                        spinner.style.fontVariationSettings = "'FILL' 1";
                        textEl.textContent = 'ARCHIVE STATUS: SYNC COMPLETE';
                        break;
                    case 'ERROR':
                        indicator.classList.add('border-red-200', 'bg-red-50', 'text-red-700');
                        spinner.textContent = 'error';
                        spinner.style.fontVariationSettings = "'FILL' 1";
                        textEl.textContent = customMsg || 'ARCHIVE STATUS: SYNC FAILED';
                        break;
                    case 'TIMEOUT':
                        indicator.classList.add('border-red-200', 'bg-red-50', 'text-red-700');
                        spinner.textContent = 'timer_off';
                        spinner.style.fontVariationSettings = "'FILL' 1";
                        textEl.textContent = 'ARCHIVE STATUS: CONNECTION TIMEOUT';
                        break;
                }
            };

            // Set initial state
            setStatus('INITIAL');

            async function syncData() {
                const GOOGLE_SHEETS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwWkm5gwcnfNKGsuIdqbwgtQKuHvpTEPMIDAGd_fKqVAUJi7hu-WQSGAVAPUC3S6J1b/exec';
                const reportData = localStorage.getItem('ocean_report');
                
                if (!reportData) {
                    setStatus('ERROR', 'Error: No survey data found in storage. Please complete the survey first.');
                    return;
                }

                try {
                    setStatus('SYNCING');
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout

                    try {
                        await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: {
                                'Content-Type': 'text/plain;charset=utf-8',
                            },
                            body: reportData,
                            signal: controller.signal
                        });
                        
                        clearTimeout(timeoutId);
                        setStatus('SUCCESS');
                    } catch (fetchError) {
                        if (fetchError.name === 'AbortError') {
                            setStatus('TIMEOUT');
                        } else {
                            throw fetchError;
                        }
                    }
                } catch (error) {
                    console.error('Data sync failed:', error);
                    setStatus('ERROR');
                }
            }

            // Immediately trigger sync if data exists
            syncData();

            finishBtn.addEventListener('click', function() {
                window.location.href = 'index.html'; 
            });
        });
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .text-editorial-tension {
            letter-spacing: -0.04em;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-cyan-100 min-h-screen flex flex-col">
<!-- Navigation -->
<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md transition-all duration-300 border-b border-slate-100">
<div class="flex items-center px-8 py-6 max-w-7xl mx-auto justify-center">
<span class="text-xl font-bold tracking-[0.2em] text-cyan-900 font-manrope">PACIFIC</span>
</div>
</nav>
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-6">
<div class="flex flex-col items-center text-center max-w-2xl mx-auto">
<header class="space-y-8 flex flex-col items-center">
<!-- Status Badge Area -->
<div class="flex flex-col items-center gap-4 min-h-[56px]" id="sync-status-container">
<div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 mb-2">
<span class="material-symbols-outlined text-sm" style='font-variation-settings: "FILL" 1;'>verified</span>
                        Cloud Archive
                    </div>
<div class="flex items-center gap-3 px-6 py-3 rounded-full border text-[12px] font-bold uppercase tracking-widest transition-all duration-500 shadow-sm border-slate-200 bg-slate-50 text-slate-500" id="sync-indicator">
<span class="material-symbols-outlined text-lg" id="sync-spinner">sync</span>
<span id="sync-text">ARCHIVE STATUS: READY TO SYNC</span>
</div>
</div>
<h1 class="text-6xl lg:text-8xl font-manrope font-extrabold text-on-surface text-editorial-tension leading-none mt-4">
                    Survey <span class="text-cyan-700">Complete.</span>
</h1>
<p class="text-lg text-on-surface-variant leading-relaxed font-medium max-w-md">
                    Thank you for your participation and help in this project. We've archived your results.
                </p>
<div class="pt-8">
<button class="text-sm font-bold uppercase tracking-[0.2em] text-cyan-900 hover:text-cyan-600 transition-colors py-4 px-10 border-b-2 border-transparent hover:border-cyan-600 group" id="finish-btn">
                        Done, Thank you !
                        <span class="material-symbols-outlined ml-2 text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</header>
</div>
</main>
<!-- Ultra-minimal Footer -->
<footer class="w-full py-12 bg-white border-t border-slate-50">
<div class="max-w-7xl mx-auto px-12">
<div class="font-manrope font-bold text-sm text-cyan-900 uppercase tracking-[0.3em]">
                PACIFIC
            </div>
</div>
</footer>
</body></html>
