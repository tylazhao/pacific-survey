<script>
    document.getElementById('finish-btn').addEventListener('click', async function() {
        /** 
         * CONFIGURATION: 
         * 1. Deploy a Google Apps Script as a Web App.
         * 2. Paste the provided Web App URL below.
         */
        const GOOGLE_SHEETS_WEB_APP_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
        
        // Retrieve data from localStorage (saved from previous survey steps)
        const reportData = localStorage.getItem('ocean_report');
        
        if (GOOGLE_SHEETS_WEB_APP_URL && GOOGLE_SHEETS_WEB_APP_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE' && reportData) {
            try {
                console.log('Attempting to sync data with Google Sheets...');
                await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Necessary for Google Apps Script Web App endpoints
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: reportData
                });
                console.log('Sync complete.');
            } catch (error) {
                console.error('Data sync failed:', error);
                // We proceed with navigation even if sync fails to ensure user flow
            }
        } else {
            console.warn('Sync skipped: Web App URL missing or no local data found.');
        }

        // Navigation: Redirect to the Welcome Screen
        window.location.href = 'index.html'; 
    });
</script>
