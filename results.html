<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PACIFIC | Survey Complete</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        manrope: ['Manrope', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0e7490', // cyan-700
                        'primary-dim': '#155e75', // cyan-800
                        background: '#ffffff',
                        'surface-variant': '#f8fafc',
                        'on-surface': '#0f172a',
                        'on-surface-variant': '#475569',
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .text-editorial-tension {
            letter-spacing: -0.04em;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-cyan-100 min-h-screen flex flex-col">
<!-- Navigation -->
<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md transition-all duration-300 border-b border-slate-100">
<div class="flex items-center px-8 py-6 max-w-7xl mx-auto justify-center">
<span class="text-xl font-bold tracking-[0.2em] text-cyan-900 font-manrope">PACIFIC</span>
</div>
</nav>
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-6">
<div class="flex flex-col items-center text-center max-w-2xl mx-auto">
<!-- Header Section -->
<header class="space-y-10 flex flex-col items-center">
<div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500">
<span class="material-symbols-outlined text-sm text-green-600" style='font-variation-settings: "FILL" 1;'>check_circle</span>
                    Assessment Finalized
                </div>
<h1 class="text-6xl lg:text-8xl font-manrope font-extrabold text-on-surface text-editorial-tension leading-none">
                    Survey <span class="text-cyan-700">Complete.</span>
</h1>
<p class="text-lg text-on-surface-variant leading-relaxed font-medium max-w-md">
                    Thank you for your participation and help in this project. We've saved the report.
                </p>
<div class="pt-6">
<button class="text-sm font-bold uppercase tracking-[0.2em] text-cyan-900 hover:text-cyan-600 transition-colors py-4 px-8 border-b-2 border-transparent hover:border-cyan-600" id="finish-btn">
                        Done, Thank you !
                    </button>
</div>
</header>
</div>
</main>
<!-- Ultra-minimal Footer -->
<footer class="w-full py-12 bg-white border-t border-slate-100">
<div class="max-w-7xl mx-auto px-12">
<div class="font-manrope font-bold text-sm text-cyan-900 uppercase tracking-[0.3em]">
                PACIFIC
            </div>
</div>
</footer>
<script>
        document.getElementById('finish-btn').addEventListener('click', async function() {
            // Placeholder for Google Sheets Web App URL
            const GOOGLE_SHEETS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxF6zGGEsyerTWURt7QNzn3m-nTscoUAhxEMHqCzqxYUpc5HccIkgWTiB9dX_XdId3g/exec';
            
            // Retrieve survey report from localStorage
            const reportData = localStorage.getItem('ocean_report');
            
            if (reportData && GOOGLE_SHEETS_WEB_APP_URL !== 'https://script.google.com/macros/s/AKfycbxF6zGGEsyerTWURt7QNzn3m-nTscoUAhxEMHqCzqxYUpc5HccIkgWTiB9dX_XdId3g/exec') {
                try {
                    console.log('Attempting to sync data with Google Sheets...');
                    // Using no-cors as is common for Simple Triggers/Web Apps if not returning JSON
                    await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: reportData
                    });
                    console.log('Sync successfully initiated.');
                } catch (error) {
                    console.error('Data sync failed:', error);
                }
            } else if (!reportData) {
                console.warn('No report data found in localStorage key "ocean_report".');
            }

            // Redirect back to home
            window.location.href = 'index.html'; 
        });
    </script>
</body></html>
